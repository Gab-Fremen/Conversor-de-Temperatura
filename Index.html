<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Temperature Converter</title>
  <link rel="stylesheet" href="style.css">-
  <link href="https://googleapis.com" rel="stylesheet">

</head>

<body>
  <header><h2>Temperature Converter</h2></header>
  <div id="Conversor">


    <div id="inputTemp">
      <input type="number" id="writeTemp">
      <div class="ButtonConteiner">
        <button class="btn" id="fromFarenheit">Farenheit</button>
        <button class="btn" id="fromCelsius">Celsius</button>
        <button class="btn" id="fromKelvin">Kelvin</button>
      </div>
    </div>


    <div id="outputTemp">
      <div id="ResultBox"><p id="result">Results:</p></div>
      <div class="ButtonConteiner">
          <button class="btn" id="toFarenheit">Farenheit</button>
          <button class="btn" id="toCelsius">Celsius</button>
          <button class="btn" id="toKelvin">Kelvin</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
