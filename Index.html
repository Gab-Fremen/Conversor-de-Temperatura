<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Conversor de temperaturas</title>
  <link rel="stylesheet" href="style.css">-
  <link href="https://googleapis.com" rel="stylesheet">

</head>

<body>
  <header><h2>Conversor de temperaturas</h2></header>
  <div id="Conversor">


    <div id="inputTemp">
      <input type="number" id="writeTemp">
      <button class="btn" id="fromFarenheit">Farenheit</button>
      <button class="btn" id="fromCelsius">Celsius</button>
      <button class="btn" id="fromKelvin">Kelvin</button>
    </div>


    <div id="outputTemp">
      <div id="ResultBox"><p id="result">Resultados:</p></div>
        <div class="buttonsint">  
          <button class="btn" id="toFarenheit">Farenheit</button>
          <button class="btn" id="toCelsius">Celsius</button>
          <button class="btn" id="toKelvin">Kelvin</button>
        </div>
    </div>
    <script src="script.js"></script>
  </div>
</body>
</html>
